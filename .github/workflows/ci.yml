name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # meta-simulator importa meta-api por sus exports, así que necesita el
      # dist construido antes de correr los tests de integración.
      - run: pnpm build

      - run: pnpm typecheck

      - run: pnpm test
